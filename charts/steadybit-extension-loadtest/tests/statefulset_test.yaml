templates:
  - statefulset.yaml
chart:
  appVersion: 0.0.0
  version: 0.0.0
tests:
  - it: manifest should match snapshot
    asserts:
      - matchSnapshot: { }
  - it: manifest should use empty update values
    set:
      loadtest:
        attributeUpdates: []
        targetReplacements: []
        simulateExtensionRestarts: []
    asserts:
      - matchSnapshot: { }
  - it: manifest should render targetReplacements
    set:
      loadtest:
        attributeUpdates: []
        targetReplacements:
          - type: "com.steadybit.extension_aws.ec2-instance"
            count: 1
            interval: 600
          - type: "com.steadybit.extension_container.container"
            count: 2
            interval: 180
          - type: "com.steadybit.extension_kubernetes.kubernetes-container"
            count: 2
            interval: 180
          - type: "com.steadybit.extension_kubernetes.kubernetes-deployment"
            count: 2
            interval: 180
        simulateExtensionRestarts: []
    asserts:
      - matchSnapshot: { }
  - it: manifest should render simulateExtensionRestarts
    set:
      loadtest:
        attributeUpdates: []
        targetReplacements: []
        simulateExtensionRestarts:
          - type: "com.steadybit.extension_aws.ec2-instance"
            duration: 30
            interval: 600
          - type: "com.steadybit.extension_container.container"
            duration: 30
            interval: 600
    asserts:
      - matchSnapshot: { }

  - it: manifest should match snapshot with custom image registry
    set:
      image:
        registry: my-registry.io
        name: steadybit/extension-loadtest
    asserts:
      - matchSnapshot: {}

  - it: manifest should match snapshot with legacy image name containing registry
    set:
      image:
        name: ghcr.io/steadybit/extension-loadtest
    asserts:
      - matchSnapshot: {}

  - it: manifest should match snapshot with global image registry
    set:
      global:
        image:
          registry: corp-registry.io
    asserts:
      - matchSnapshot: {}

  - it: manifest should match snapshot with image pull secrets
    set:
      image:
        pullSecrets:
          - my-pull-secret
    asserts:
      - matchSnapshot: {}

  - it: manifest should match snapshot with global image pull secrets
    set:
      global:
        image:
          pullSecrets:
            - global-pull-secret
    asserts:
      - matchSnapshot: {}
